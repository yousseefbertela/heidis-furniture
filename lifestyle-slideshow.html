<style>
  :root{--bg:#1c1814;--fg:#f3ebdd;--accent:#8c6e45}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:"Jost",system-ui,Arial,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{padding:14px 22px;display:flex;align-items:center;gap:18px;border-bottom:1px solid rgba(255,255,255,.08)}
  header h1{font-family:"Cormorant Garamond",Georgia,serif;font-weight:500;font-size:19px;letter-spacing:.02em}
  header .count{margin-left:auto;font-size:13px;opacity:.85;letter-spacing:.05em}
  .stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .stage img{max-width:92%;max-height:92%;object-fit:contain;box-shadow:0 24px 70px rgba(0,0,0,.55);border-radius:4px}
  .cap{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:12px;opacity:.72;background:rgba(0,0,0,.45);padding:5px 14px;border-radius:20px;max-width:80%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .nav:hover{background:#fff;color:#1c1814;border-color:#fff}
  .prev{left:20px}.next{right:20px}
  .bar{display:flex;gap:16px;align-items:center;padding:11px 22px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;opacity:.9}
  .bar button{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--fg);padding:7px 18px;border-radius:20px;cursor:pointer;font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:.2s}
  .bar button:hover{background:var(--fg);color:var(--bg)}
  .thumbs{display:flex;gap:6px;overflow-x:auto;padding:9px 18px;border-top:1px solid rgba(255,255,255,.08)}
  .thumbs::-webkit-scrollbar{height:8px}.thumbs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}
  .thumbs img{height:60px;width:60px;object-fit:cover;border-radius:3px;cursor:pointer;opacity:.45;transition:.15s;flex:0 0 auto}
  .thumbs img.active,.thumbs img:hover{opacity:1;outline:2px solid var(--accent)}
</style>
</head>

  function show(n){i=(n+imgs.length)%imgs.length;main.src=dir+encodeURIComponent(imgs[i]);cap.textContent=imgs[i];count.textContent=(i+1)+" / "+imgs.length;var ts=thumbs.children;for(var k=0;k<ts.length;k++){ts[k].className=(k===i?"active":"")}if(ts[i])ts[i].scrollIntoView({inline:"center",block:"nearest"})}
